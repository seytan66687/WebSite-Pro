services:
  - type: web
    name: site-perso
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm ls nodemailer && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: REVIEWS_DB_PATH
        value: /var/data/reviews.sqlite
      - key: CORS_ORIGIN
        value: https://www.mathislallemand.fr,https://mathislallemand.fr
      - key: MAX_BODY_SIZE
        value: "100000"
      - key: REQUEST_TIMEOUT_MS
        value: "10000"
      - key: RATE_LIMIT_WINDOW_MS
        value: "600000"
      - key: RATE_LIMIT_MAX_POSTS
        value: "20"
      - key: CONTACT_TO_EMAIL
        value: mathis.lallemmand2@gmail.com
      - key: CONTACT_FROM_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
    disk:
      name: reviews-data
      mountPath: /var/data
      sizeGB: 1
